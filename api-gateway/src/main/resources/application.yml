server:
  port: 8080

spring:
  application:
    name: api-gateway

services:
  order:
    url: ${ORDER_SERVICE_URL:http://localhost:8081}
  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
  payment:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.research: DEBUG
