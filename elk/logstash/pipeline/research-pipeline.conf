# ─────────────────────────────────────────────────────────
#  Logstash Pipeline
#  research-pipeline.conf
#
#  Flow:
#    Filebeat → [input] → [filter] → [output] → Elasticsearch
#
#  What this does:
#    1. Receives logs from Filebeat on port 5044
#    2. Parses and enriches each log event
#    3. Tags failure injection events automatically
#    4. Writes to two Elasticsearch indices:
#         microservices-logs-*   (all logs — for ML training)
#         microservices-alerts-* (failure injection events only)
# ─────────────────────────────────────────────────────────

input {
  beats {
    port => 5044
  }
}

filter {

  # ── Step 1: Parse timestamp ────────────────────────────
  # Logstash encoder writes ISO8601 timestamps — parse them
  # so Elasticsearch gets a proper @timestamp field
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }

  # ── Step 2: Normalise log level ───────────────────────
  # Uppercase the level field for consistent querying
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  }

  # ── Step 3: Extract service name ─────────────────────
  # The service field comes from either:
  #   (a) Logstash encoder customFields in the JSON log, or
  #   (b) Filebeat fields.service (fallback)
  if ![service] {
    mutate {
      add_field => { "service" => "%{[fields][service]}" }
    }
  }

  # ── Step 4: Tag failure injection events ─────────────
  # Any log containing FAILURE_INJECTION is automatically
  # tagged — makes it easy to find pre-failure windows
  if [message] =~ "FAILURE_INJECTION" {
    mutate {
      add_tag    => ["failure_injection"]
      add_field  => { "event_type" => "failure_injection" }
    }

    # Extract injection type from message (e.g. MEMORY_LEAK, CPU_OVERLOAD)
    grok {
      match => {
        "message" => "type=%{WORD:injection_type} status=%{WORD:injection_status}"
      }
      tag_on_failure => ["_grok_injection_parse_failure"]
    }
  }

  # ── Step 5: Tag error-level logs ─────────────────────
  if [level] == "ERROR" {
    mutate {
      add_tag => ["error_event"]
    }
  }

  if [level] == "WARN" {
    mutate {
      add_tag => ["warn_event"]
    }
  }

  # ── Step 6: Extract response time if present ─────────
  # Pulls responseTimeMs and durationMs out of message text
  # so they become queryable numeric fields in Elasticsearch
  if [message] =~ "responseTimeMs" {
    grok {
      match => {
        "message" => "responseTimeMs=%{NUMBER:response_time_ms:float}"
      }
      tag_on_failure => ["_grok_latency_parse_failure"]
    }
  }

  if [message] =~ "durationMs" {
    grok {
      match => {
        "message" => "durationMs=%{NUMBER:duration_ms:float}"
      }
      tag_on_failure => ["_grok_duration_parse_failure"]
    }
  }

  # ── Step 7: Extract heap usage if present ────────────
  if [message] =~ "heapUsedPct" {
    grok {
      match => {
        "message" => "heapUsedPct=%{NUMBER:heap_used_pct:float}"
      }
      tag_on_failure => ["_grok_heap_parse_failure"]
    }
  }

  # ── Step 8: Extract CPU load if present ──────────────
  if [message] =~ "cpuLoadPct" {
    grok {
      match => {
        "message" => "cpuLoadPct=%{NUMBER:cpu_load_pct:float}"
      }
      tag_on_failure => ["_grok_cpu_parse_failure"]
    }
  }

  # ── Step 9: Clean up Filebeat metadata ───────────────
  mutate {
    remove_field => ["agent", "ecs", "input", "log", "host", "fields"]
  }
}

output {

  # ── All logs → main index ─────────────────────────────
  # Index pattern: microservices-logs-YYYY.MM.DD
  # This is your primary ML training data source
  elasticsearch {
    hosts    => ["elasticsearch:9200"]
    index    => "microservices-logs-%{+YYYY.MM.dd}"
    action   => "index"
  }

  # ── Failure injection events → separate alert index ───
  # Easier to query just the labelled failure events
  if "failure_injection" in [tags] {
    elasticsearch {
      hosts  => ["elasticsearch:9200"]
      index  => "microservices-alerts-%{+YYYY.MM.dd}"
      action => "index"
    }
  }

  # ── Debug: print to Logstash console (disable in prod) ─
  # stdout { codec => rubydebug }
}
