server:
  port: 8083

spring:
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/paymentdb}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# Simulate payment gateway failure rate (0.0 = never fail, 0.1 = 10% fail rate)
payment:
  failure-rate: 0.05

logging:
  level:
    root: INFO
    com.research: DEBUG
